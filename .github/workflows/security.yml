name: Security Checks

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'scripts/security/**'
      - '.github/workflows/security.yml'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'scripts/security/**'
      - '.github/workflows/security.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make security scripts executable
        run: chmod +x scripts/security/*.sh

      - name: Run general security check
        run: bash scripts/security/security-check.sh

      - name: Run supply-chain security check
        run: bash scripts/security/supply-chain-check.sh
